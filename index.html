<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Drizzie</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Monoton&family=Pacifico&family=Bebas+Neue&family=Orbitron&display=swap');

body {
    margin: 0;
    font-family: Arial;
    color: white;
    overflow-x: hidden;
    background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #000);
    background-size: 400% 400%;
    animation: bgMove 10s infinite alternate;
}

@keyframes bgMove {
    0% { background-position: 0% }
    100% { background-position: 100% }
}

/* 鼠标光效 */
.cursor {
    position: fixed;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, rgba(255,255,255,0.15), transparent);
    pointer-events: none;
    transform: translate(-50%, -50%);
}

/* 首页 */
.hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px;
}

/* 名字 */
.name-line {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    font-size: 70px;
}

.name-line span {
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 1s forwards;
}

.name-line span:nth-child(1){animation-delay:0.2s;}
.name-line span:nth-child(2){animation-delay:0.4s;}
.name-line span:nth-child(3){animation-delay:0.6s;}
.name-line span:nth-child(4){animation-delay:0.8s;}
.name-line span:nth-child(5){animation-delay:1s;}

@keyframes fadeUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* 字体风格 */
.style1 { font-family: 'Monoton'; color:#ff4d4d;}
.style2 { font-family: 'Pacifico'; color:#00ffcc;}
.style3 { font-family: 'Bebas Neue'; color:#ffd700;}
.style4 { font-family: 'Orbitron'; color:#0ff; text-shadow:0 0 10px #0ff;}
.style5 {
    background: linear-gradient(90deg, red, orange, yellow, green, cyan, blue, purple);
    -webkit-background-clip: text;
    color: transparent;
}

/* 按钮 */
.btn {
    margin-top: 20px;
    padding: 10px 20px;
    border-radius: 30px;
    background: white;
    color: black;
    cursor: pointer;
    width: fit-content;
}

/* 卡片 */
.section {
    padding: 80px 60px;
}

.cards {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
}

.card {
    width: 300px;
    padding: 20px;
    border-radius: 15px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    transition: 0.3s;
    opacity: 0;
    transform: translateY(50px);
}

.card.show {
    opacity: 1;
    transform: translateY(0);
}

.card:hover {
    transform: scale(1.05);
}

img {
    width: 100%;
    border-radius: 10px;
}

/* 音乐播放器 */
.music-bar {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
}

button {
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="cursor" id="cursor"></div>

<!-- 首页 -->
<div class="hero">
    <div class="name-line">
        <span class="style1">Drizzie</span>
        <span class="style2">Drizzie</span>
        <span class="style3">Drizzie</span>
        <span class="style4">Drizzie</span>
        <span class="style5">Drizzie</span>
    </div>

    <p>记录生活 / 情绪 / 音乐</p>
    <div class="btn" onclick="scrollDown()">进入我的世界</div>
</div>

<!-- 生活 -->
<div class="section">
    <h2>📸 生活</h2>
    <div class="cards">
        <div class="card"><img src="https://picsum.photos/300/200?1"><p>夜晚</p></div>
        <div class="card"><img src="https://picsum.photos/300/200?2"><p>随手拍</p></div>
    </div>
</div>

<!-- 音乐 -->
<div class="section">
    <h2>🎧 音乐</h2>
    <div class="cards">
        <div class="card">
            <p>Drake - Passionfruit</p>
            <button onclick="playMusic()">播放</button>
        </div>
    </div>
</div>

<!-- 想法 -->
<div class="section">
    <h2>💭 想法</h2>
    <div class="cards">
        <div class="card"><p>慢慢搞清楚自己是谁</p></div>
        <div class="card"><p>有时候焦虑，但在变强</p></div>
    </div>
</div>

<!-- 音乐 -->
<div class="music-bar">
    <button onclick="playMusic()">🎵 Play</button>
    <audio id="music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
</div>

<script>
// 音乐
function playMusic(){
    document.getElementById("music").play();
}

// 滚动
function scrollDown(){
    window.scrollTo({top:window.innerHeight,behavior:'smooth'});
}

// 鼠标光效
document.addEventListener("mousemove", e=>{
    let c = document.getElementById("cursor");
    c.style.left = e.clientX + "px";
    c.style.top = e.clientY + "px";
});

// 滚动动画
window.addEventListener("scroll", ()=>{
    document.querySelectorAll(".card").forEach(el=>{
        let rect = el.getBoundingClientRect();
        if(rect.top < window.innerHeight - 100){
            el.classList.add("show");
        }
    });
});
</script>

</body>
</html>
