<!-- 字体 -->
<style>
@import url('https://fonts.googleapis.com/css2?family=Monoton&family=Orbitron&family=Bebas+Neue&family=Pacifico&display=swap');

body {
    margin: 0;
    background: linear-gradient(135deg, #1f3b44, #000);
    color: white;
    font-family: sans-serif;
    cursor: none;
    overflow-x: hidden;
}

.hero {
    padding: 120px 60px;
}

/* ===== 滚动名字 ===== */
.name-marquee {
    width: 100%;
    overflow: hidden;
    white-space: nowrap;
    margin-bottom: 40px;
}

.track {
    display: inline-flex;
    gap: 80px;
    animation: scroll 12s linear infinite;
}

.track span {
    font-size: 100px;
    line-height: 1;
    transition: 0.3s;
    cursor: pointer;
}

.track span:hover {
    transform: scale(1.3) rotate(-8deg);
}

/* 字体风格 */
.n1 { font-family: 'Monoton'; color: #ff3b3b; }
.n2 { font-family: 'Pacifico'; color: #00ffd5; }
.n3 { font-family: 'Bebas Neue'; color: #ffd700; letter-spacing: 6px; }
.n4 { font-family: 'Orbitron'; color: #00f0ff; text-shadow: 0 0 20px #00f0ff; }
.n5 {
    background: linear-gradient(90deg, red, orange, yellow, green, cyan, blue, purple);
    -webkit-background-clip: text;
    color: transparent;
}
.n6 { color: #8a2be2; font-weight: bold; }

@keyframes scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
}

/* ===== 文案 ===== */
p {
    font-size: 20px;
    opacity: 0.8;
}

/* ===== 按钮 ===== */
.btn {
    margin-top: 30px;
    background: white;
    color: black;
    padding: 12px 26px;
    border-radius: 30px;
    display: inline-block;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.1);
}

/* ===== 高级鼠标 ===== */
.cursor {
    width: 18px;
    height: 18px;
    border: 2px solid #00ffd5;
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 20px #00ffd5;
    z-index: 999;
}

/* 鼠标拖尾点 */
.trail {
    width: 6px;
    height: 6px;
    background: #00ffd5;
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    opacity: 0.6;
    z-index: 998;
}

</style>

</div>

<!-- 鼠标 -->

<div class="cursor"></div>

<script>
// ===== 鼠标光标 =====
const cursor = document.querySelector(".cursor");

document.addEventListener("mousemove", e => {
    cursor.style.left = e.clientX + "px";
    cursor.style.top = e.clientY + "px";

    // 拖尾效果
    const trail = document.createElement("div");
    trail.className = "trail";
    trail.style.left = e.clientX + "px";
    trail.style.top = e.clientY + "px";
    document.body.appendChild(trail);

    setTimeout(() => {
        trail.remove();
    }, 300);
});

// ===== 点击爆炸效果 =====
document.querySelectorAll(".track span").forEach(el => {
    el.addEventListener("click", () => {
        el.style.transform = "scale(2) rotate(360deg)";
        setTimeout(() => {
            el.style.transform = "";
        }, 400);
    });
});
</script>
