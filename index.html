<!DOCTYPE html>

<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drizzie</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Monoton&family=Orbitron&family=Bebas+Neue&family=Pacifico&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}

body{
    background:#081c24;
    color:white;
    font-family:sans-serif;
    overflow-x:hidden;
}

/* ===== 背景文字系统 ===== */
.bg{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:0;
    overflow:hidden;
}

/* 每一行 */
.row{
    display:flex;
    white-space:nowrap;
    position:absolute;
    width:200%;
    opacity:0.25;
    animation:move linear infinite;
}

/* 每一行不同速度 */
.row:nth-child(odd){ animation-duration:18s; }
.row:nth-child(even){ animation-duration:25s; }

/* 文字样式 */
.row span{
    margin-right:80px;
    font-weight:bold;
}

/* 字体 */
.f1{font-family:'Monoton'; color:#ff3b3b;}
.f2{font-family:'Pacifico'; color:#00ffd5;}
.f3{font-family:'Bebas Neue'; color:#ffd700;}
.f4{font-family:'Orbitron'; color:#00f0ff;}

/* 动画 */
@keyframes move{
    from{transform:translateX(0);}
    to{transform:translateX(-50%);}
}

/* ===== 页面 ===== */
.section{
    min-height:100vh;
    padding:100px 8vw;
    position:relative;
    z-index:2;
}

.title{
    font-size:80px;
    font-family:'Monoton';
}

.sub{
    margin-top:10px;
    opacity:0.8;
}

.btn{
    margin-top:20px;
    display:inline-block;
    padding:12px 28px;
    background:white;
    color:black;
    border-radius:30px;
}

/* 滚动动画 */
.fade{
    opacity:0;
    transform:translateY(50px);
    transition:0.8s;
}
.fade.show{
    opacity:1;
    transform:translateY(0);
}

/* 照片墙 */
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-top:40px;
}

.gallery img{
    width:100%;
    border-radius:12px;
}

/* 手机 */
@media(max-width:768px){
    .title{font-size:50px;}
}
</style>

</head>

<body>

<!-- 背景 -->

<div class="bg" id="bg"></div>

<!-- 首页 -->

<div class="section">
<h1 class="title fade">Drizzie</h1>
<p class="sub fade">记录生活 / 情绪 / 音乐</p>
<div class="btn fade">进入我的世界</div>
</div>

<!-- 生活 -->

<div class="section">
<h2 class="title fade">生活</h2>

<div class="gallery fade">
<img src="https://picsum.photos/300/200?1">
<img src="https://picsum.photos/300/200?2">
<img src="https://picsum.photos/300/200?3">
<img src="https://picsum.photos/300/200?4">
</div>
</div>

<!-- 音乐 -->

<div class="section">
<h2 class="title fade">音乐</h2>

<audio controls loop class="fade">
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>
</div>

<script>
// ===== 生成多行背景文字 =====
const bg=document.getElementById("bg");

const fonts=["f1","f2","f3","f4"];

for(let i=0;i<20;i++){   // 行数（可以改更多）
    let row=document.createElement("div");
    row.className="row";
    row.style.top=(i*5)+"%";

    for(let j=0;j<20;j++){
        let span=document.createElement("span");
        span.innerText="DRIZZIE";

        // 随机字体
        span.classList.add(fonts[Math.floor(Math.random()*fonts.length)]);

        // 随机大小
        span.style.fontSize=(40+Math.random()*80)+"px";

        row.appendChild(span);
    }

    bg.appendChild(row);
}

// ===== 滚动动画 =====
const fades=document.querySelectorAll(".fade");

window.addEventListener("scroll",()=>{
    let h=window.innerHeight*0.85;
    fades.forEach(el=>{
        if(el.getBoundingClientRect().top<h){
            el.classList.add("show");
        }
    });
});
</script>

</body>
</html>
