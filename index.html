<!DOCTYPE html>

<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drizzie</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Monoton&family=Orbitron&family=Bebas+Neue&family=Pacifico&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: radial-gradient(circle at center, #1f3b44, #000);
    color: white;
    font-family: sans-serif;
    overflow-x: hidden;
    scroll-behavior: smooth;
}

/* ===== 主内容 ===== */
.hero {
    padding: 100px 5vw;
}

/* ===== 滚动标题 ===== */
.name-marquee {
    overflow: hidden;
    white-space: nowrap;
    margin-bottom: 40px;
}

.track {
    display: inline-flex;
    gap: 60px;
    animation: scroll 14s linear infinite;
}

.track span {
    font-size: 90px;
    line-height: 1;
    transition: 0.3s;
}

.track span:hover {
    transform: scale(1.2);
}

/* 字体 */
.n1 { font-family: 'Monoton'; color: #ff3b3b; }
.n2 { font-family: 'Pacifico'; color: #00ffd5; }
.n3 { font-family: 'Bebas Neue'; color: #ffd700; letter-spacing: 4px; }
.n4 { font-family: 'Orbitron'; color: #00f0ff; text-shadow: 0 0 15px #00f0ff; }
.n5 {
    background: linear-gradient(90deg, red, orange, yellow, green, cyan, blue, purple);
    -webkit-background-clip: text;
    color: transparent;
}
.n6 { color: #8a2be2; font-weight: bold; }

@keyframes scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
}

/* 文案 */
.desc {
    margin-top: 20px;
    font-size: 18px;
    opacity: 0.8;
}

/* 按钮 */
.btn {
    margin-top: 25px;
    display: inline-block;
    padding: 12px 28px;
    background: white;
    color: black;
    border-radius: 25px;
    text-decoration: none;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.1);
}

/* ===== 分区 ===== */
.section {
    padding: 100px 5vw;
}

.title {
    font-size: 50px;
    margin-bottom: 30px;
}

/* 照片墙 */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 20px;
}

.gallery img {
    width: 100%;
    border-radius: 12px;
    transition: 0.3s;
}

.gallery img:hover {
    transform: scale(1.08);
}

/* 音乐 */
.music {
    margin-top: 20px;
}

/* 手机 */
@media (max-width: 768px) {
    .track span {
        font-size: 48px;
    }
}
</style>

</head>

<body>

<div class="hero">

<!-- 滚动名字 -->

<div class="name-marquee">
    <div class="track">
        <span class="n1">DRIZZIE</span>
        <span class="n2">Drizzie</span>
        <span class="n3">DRIZZIE</span>
        <span class="n4">Drizzie</span>
        <span class="n5">Drizzie</span>
        <span class="n6">DRIZZIE</span>
        <span class="n1">DRIZZIE</span>
        <span class="n2">Drizzie</span>
    </div>
</div>

<div class="desc">记录生活 / 情绪 / 音乐</div>

<!-- 修复按钮 -->

<a href="#life" class="btn">进入我的世界</a>

</div>

<!-- 生活 -->

<div class="section" id="life">
<h2 class="title">生活</h2>

<div class="gallery">
    <img src="https://picsum.photos/300/200?1">
    <img src="https://picsum.photos/300/200?2">
    <img src="https://picsum.photos/300/200?3">
    <img src="https://picsum.photos/300/200?4">
</div>
</div>

<!-- 音乐 -->

<div class="section">
<h2 class="title">音乐</h2>

<div class="music">
<audio controls loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>
</div>
</div>

<script>
// 标题点击小动效（更高级）
document.querySelectorAll(".track span").forEach(el=>{
    el.onclick=()=>{
        el.style.transform="scale(1.4)";
        setTimeout(()=>el.style.transform="",200);
    };
});
</script>

</body>
</html>
