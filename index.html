<!DOCTYPE html>

<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Drizzie</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Monoton&family=Orbitron&family=Bebas+Neue&family=Pacifico&display=swap');

body {
    margin: 0;
    background: radial-gradient(circle at center, #1f3b44, #000);
    color: white;
    font-family: sans-serif;
    cursor: none;
    overflow-x: hidden;
}
/* ===== 主体 ===== */
.hero {
    position: relative;
    z-index: 2;
    padding: 120px 60px;
}

/* ===== 滚动标题 ===== */
.name-marquee {
    overflow: hidden;
    white-space: nowrap;
    margin-bottom: 40px;
}

.track {
    display: inline-flex;
    gap: 80px;
    animation: scroll 12s linear infinite;
}

.track span {
    font-size: 100px;
    transition: 0.3s;
    cursor: pointer;
}

.track span:hover {
    transform: scale(1.3) rotate(-8deg);
}

.n1 { font-family: 'Monoton'; color: #ff3b3b; }
.n2 { font-family: 'Pacifico'; color: #00ffd5; }
.n3 { font-family: 'Bebas Neue'; color: #ffd700; letter-spacing: 6px; }
.n4 { font-family: 'Orbitron'; color: #00f0ff; text-shadow: 0 0 20px #00f0ff; }
.n5 {
    background: linear-gradient(90deg, red, orange, yellow, green, cyan, blue, purple);
    -webkit-background-clip: text;
    color: transparent;
}
.n6 { color: #8a2be2; font-weight: bold; }

@keyframes scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
}

/* ===== 按钮 ===== */
.btn {
    margin-top: 30px;
    background: white;
    color: black;
    padding: 12px 26px;
    border-radius: 30px;
    display: inline-block;
    cursor: pointer;
}

/* ===== 鼠标 ===== */
.cursor {
    width: 18px;
    height: 18px;
    border: 2px solid #00ffd5;
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 20px #00ffd5;
    z-index: 999;
}

.trail {
    width: 6px;
    height: 6px;
    background: #00ffd5;
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
}

/* ===== 音乐播放器 ===== */
.music {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 10;
}

/* ===== 照片墙 ===== */
.gallery {
    margin-top: 100px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 20px;
}

.gallery img {
    width: 100%;
    border-radius: 10px;
    transition: 0.3s;
}

.gallery img:hover {
    transform: scale(1.1);
}

/* ===== 手机适配 ===== */
@media (max-width: 768px) {
    .track span {
        font-size: 50px;
    }
}
</style>

</head>

<body>

<canvas id="bg"></canvas>

<div class="hero">
    <div class="name-marquee">
        <div class="track">
            <span class="n1">DRIZZIE</span>
            <span class="n2">Drizzie</span>
            <span class="n3">DRIZZIE</span>
            <span class="n4">Drizzie</span>
            <span class="n5">Drizzie</span>
            <span class="n6">DRIZZIE</span>

            <span class="n2">Drizzie</span>
        </div>
    </div>

</div>

<!-- 鼠标 -->

<div class="cursor"></div>

<!-- 音乐 -->

<div class="music">
    <audio controls autoplay loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
    </audio>
</div>

<script>
// 鼠标
const cursor = document.querySelector(".cursor");

document.addEventListener("mousemove", e => {
    cursor.style.left = e.clientX + "px";
    cursor.style.top = e.clientY + "px";

    const trail = document.createElement("div");
    trail.className = "trail";
    trail.style.left = e.clientX + "px";
    trail.style.top = e.clientY + "px";
    document.body.appendChild(trail);

    setTimeout(() => trail.remove(), 300);
});

// 点击动画
document.querySelectorAll(".track span").forEach(el => {
    el.onclick = () => {
        el.style.transform = "scale(2) rotate(360deg)";
        setTimeout(()=> el.style.transform="", 400);
    };
});

// 背景粒子
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 80; i++) {
    particles.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        vx: Math.random()*2-1,
        vy: Math.random()*2-1
    });
}

function animate() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;

        if (p.x<0||p.x>canvas.width) p.vx*=-1;
        if (p.y<0||p.y>canvas.height) p.vy*=-1;

        ctx.beginPath();
        ctx.arc(p.x,p.y,2,0,Math.PI*2);
        ctx.fillStyle="white";
        ctx.fill();
    });

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
