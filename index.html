<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drizzie</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Monoton&family=Orbitron&family=Bebas+Neue&family=Pacifico&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: radial-gradient(circle at center, #1f3b44, #000);
    color: white;
    font-family: sans-serif;
    overflow-x: hidden;
    scroll-behavior: smooth;
    position: relative;
}

/* 动态背景层 */
body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 20% 50%, rgba(31, 59, 68, 0.8), transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 240, 255, 0.1), transparent 50%);
    z-index: -1;
    animation: bgMove 15s ease-in-out infinite alternate;
}

@keyframes bgMove {
    0% { transform: translate(0, 0); }
    100% { transform: translate(20px, -20px); }
}

/* 胶片噪点 */
body::after {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
    opacity: 0.15;
    pointer-events: none;
    z-index: 9999;
}

/* ===== 主内容 ===== */
.hero {
    padding: 100px 5vw;
}

/* ===== 滚动标题 ===== */
.name-marquee {
    overflow: hidden;
    white-space: nowrap;
    margin-bottom: 40px;
}

.track {
    display: inline-flex;
    gap: 60px;
    width: max-content;
    animation: scroll 12s linear infinite;
}

.track span {
    font-size: 90px;
    line-height: 1;
    transition: 0.3s;
    cursor: pointer;
}

.track span:hover {
    transform: scale(1.2);
}

/* 不同样式的Drizzie字体 */
.d1 { font-family: 'Pacifico'; color: #00ffd5; }
.d2 { font-family: 'Bebas Neue'; color: #ffd700; letter-spacing: 4px; }
.d3 { font-family: 'Orbitron'; color: #00f0ff; text-shadow: 0 0 15px #00f0ff; }
.d4 {
    background: linear-gradient(90deg, red, orange, yellow, green, cyan, blue, purple);
    -webkit-background-clip: text;
    color: transparent;
    font-family: 'Monoton';
}

@keyframes scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-25%); }
}

/* 个人简介 */
.profile {
    margin-top: 20px;
    font-size: 18px;
    opacity: 0.8;
    max-width: 800px;
    line-height: 1.6;
}

/* 按钮区域 */
.btn-group {
    margin-top: 25px;
}

.btn {
    display: inline-block;
    padding: 12px 28px;
    background: white;
    color: black;
    border-radius: 25px;
    text-decoration: none;
    transition: 0.3s;
    font-size: 16px;
    font-weight: 600;
}

.btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px rgba(255,255,255,0.3);
}

.btn-subtitle {
    display: block;
    margin-top: 8px;
    font-size: 14px;
    color: #00f0ff;
    opacity: 0.8;
}

/* ===== 分区通用样式 ===== */
.section {
    padding: 100px 5vw;
}

.section-title {
    font-size: 50px;
    margin-bottom: 30px;
    color: #00ffd5;
    text-shadow: 0 0 10px rgba(0, 255, 213, 0.5);
}

/* 滚动渐入 */
.fade-in {
    opacity: 0;
    transform: translateY(30px);
    transition: all 0.8s ease-out;
}

.fade-in.visible {
    opacity: 1;
    transform: translateY(0);
}

/* 照片墙 */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 20px;
}

.gallery img {
    width: 100%;
    border-radius: 12px;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    filter: brightness(0.85);
}

.gallery img:hover {
    transform: scale(1.08) rotate(1deg);
    filter: brightness(1.15);
    box-shadow: 0 10px 30px rgba(0, 240, 255, 0.2);
}

/* 回到顶部 */
.back-to-top {
    position: fixed;
    bottom: 30px;
    right: 30px;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: rgba(0, 240, 255, 0.2);
    border: 1px solid rgba(0, 240, 255, 0.5);
    color: white;
    font-size: 20px;
    cursor: pointer;
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s;
    z-index: 999;
}

.back-to-top.visible {
    opacity: 1;
    visibility: visible;
}

.back-to-top:hover {
    background: rgba(0, 240, 255, 0.4);
    box-shadow: 0 0 15px rgba(0, 240, 255, 0.5);
    transform: translateY(-5px);
}

/* 手机适配 */
@media (max-width: 768px) {
    .track span {
        font-size: 50px;
    }
    .section-title {
        font-size: 32px;
    }
    .hero, .section {
        padding: 60px 5vw;
    }
    .gallery {
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    }
}
</style>
</head>
<body>

<!-- 主页面 -->
<div class="hero">
    <!-- 只展示不同样式的Drizzie滚动 -->
    <div class="name-marquee">
        <div class="track">
            <span class="d1">Drizzie</span>
            <span class="d2">Drizzie</span>
            <span class="d3">Drizzie</span>
            <span class="d4">Drizzie</span>
            <span class="d1">Drizzie</span>
            <span class="d2">Drizzie</span>
            <span class="d3">Drizzie</span>
            <span class="d4">Drizzie</span>
        </div>
    </div>

    <!-- 个人简介 -->
    <div class="profile fade-in">
        大家好，我是Drizzie。<br>
        热爱视觉艺术、潮流文化与创意设计，始终坚持用独特的视角诠释生活中的美好。<br>
        这个宇宙里，有我的创作、我的思考，还有我对世界的理解。<br>
        欢迎走进我的专属空间，一起探索无限可能。
    </div>

    <!-- 按钮区域（含英文副标题） -->
    <div class="btn-group fade-in">
        <a href="#module1" class="btn">
            探索Drizzie的宇宙<br>
            Explore Drizzie's Universe</a>
    </div>
</div>

<!-- 模块一 -->
<div id="module1" class="section">
    <h2 class="section-title fade-in">模块一</h2>
    <div class="gallery fade-in">
        <img src="https://picsum.photos/400/600?random=1" alt="模块一作品">
        <img src="https://picsum.photos/400/600?random=2" alt="模块一作品">
        <img src="https://picsum.photos/400/600?random=3" alt="模块一作品">
        <img src="https://picsum.photos/400/600?random=4" alt="模块一作品">
    </div>
</div>

<!-- 模块二 -->
<div id="module2" class="section">
    <h2 class="section-title fade-in">模块二</h2>
    <div class="gallery fade-in">
        <img src="https://picsum.photos/400/600?random=5" alt="模块二作品">
        <img src="https://picsum.photos/400/600?random=6" alt="模块二作品">
        <img src="https://picsum.photos/400/600?random=7" alt="模块二作品">
        <img src="https://picsum.photos/400/600?random=8" alt="模块二作品">
    </div>
</div>

<!-- 回到顶部按钮 -->
<button class="back-to-top" id="backToTop">↑</button>

<script>
// 1. 滚动淡入效果
const fadeElements = document.querySelectorAll('.fade-in');
const backToTopBtn = document.getElementById('backToTop');

function checkFade() {
    fadeElements.forEach(el => {
        const rect = el.getBoundingClientRect();
        const isVisible = rect.top < window.innerHeight * 0.85;
        if (isVisible) el.classList.add('visible');
    });

    // 回到顶部按钮显示/隐藏
    if (window.scrollY > 300) {
        backToTopBtn.classList.add('visible');
    } else {
        backToTopBtn.classList.remove('visible');
    }
}

window.addEventListener('scroll', checkFade);
window.addEventListener('load', checkFade);

// 2. 回到顶部功能
backToTopBtn.addEventListener('click', () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
});
</script>

</body>
</html>
