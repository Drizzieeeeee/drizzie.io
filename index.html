<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Drizzie</title>

<style>
body {
    margin: 0;
    font-family: "Helvetica Neue", sans-serif;
    color: white;
    background: linear-gradient(120deg, #0f2027, #203a43, #2c5364);
}

/* 顶部导航 */
.nav {
    position: fixed;
    width: 100%;
    top: 0;
    padding: 15px 40px;
    display: flex;
    justify-content: space-between;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
}

.nav a {
    color: white;
    margin-left: 20px;
    text-decoration: none;
}

/* 首页大标题 */
.hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding-left: 60px;
}

.hero h1 {
    font-size: 60px;
}

.hero p {
    font-size: 20px;
    opacity: 0.8;
}

/* 按钮 */
.btn {
    margin-top: 20px;
    padding: 10px 20px;
    border-radius: 30px;
    background: white;
    color: black;
    cursor: pointer;
    width: fit-content;
}

/* 卡片区域 */
.section {
    padding: 80px 60px;
}

.cards {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
}

.card {
    width: 300px;
    padding: 20px;
    border-radius: 15px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px);
}

img {
    width: 100%;
    border-radius: 10px;
}

/* 音乐条 */
.music-bar {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
}

button {
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
}
</style>

</head>

<body>

<!-- 导航 -->
<div class="nav">
    <div>Drizzie</div>
    <div>
        <a href="#life">生活</a>
        <a href="#music">音乐</a>
        <a href="#thought">想法</a>
    </div>
</div>

<!-- 首页 -->
<div class="hero">
    <h1>Drizzie</h1>
    <p>我在记录我的生活、情绪，还有我听的歌</p>
    <div class="btn" onclick="scrollToSection()">探索我的世界</div>
</div>

<!-- 生活 -->
<div class="section" id="life">
    <h2>📸 生活</h2>
    <div class="cards">
        <div class="card">
            <img src="https://picsum.photos/300/200?1">
            <p>夜晚的城市</p>
        </div>
        <div class="card">
            <img src="https://picsum.photos/300/200?2">
            <p>随手拍</p>
        </div>
    </div>
</div>

<!-- 音乐 -->
<div class="section" id="music">
    <h2>🎧 最近在听</h2>
    <div class="cards">
        <div class="card">
            <p>Drake - Passionfruit</p>
            <button onclick="playMusic()">播放</button>
        </div>
        <div class="card">
            <p>Kendrick Lamar - HUMBLE</p>
        </div>
    </div>
</div>

<!-- 想法 -->
<div class="section" id="thought">
    <h2>💭 想法</h2>
    <div class="cards">
        <div class="card">
            <p>最近在慢慢搞清楚自己是谁</p>
        </div>
        <div class="card">
            <p>有时候会焦虑，但也在变强</p>
        </div>
    </div>
</div>

<!-- 音乐播放器 -->
<div class="music-bar">
    <button onclick="playMusic()">🎵 Play</button>
    <audio id="music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
</div>

<script>
function playMusic(){
    document.getElementById("music").play();
}

function scrollToSection(){
    document.getElementById("life").scrollIntoView({behavior:"smooth"});
}
</script>

</body>
</html>
