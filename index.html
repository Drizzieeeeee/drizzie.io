<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drizzie</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Monoton&family=Orbitron&family=Bebas+Neue&family=Pacifico&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: radial-gradient(circle at center, #1f3b44, #000);
    color: white;
    font-family: sans-serif;
    overflow-x: hidden;
    scroll-behavior: smooth;
    position: relative;
}

/* 动态背景层 */
body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 20% 50%, rgba(31, 59, 68, 0.8), transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 240, 255, 0.1), transparent 50%);
    z-index: -1;
    animation: bgMove 15s ease-in-out infinite alternate;
}

@keyframes bgMove {
    0% { transform: translate(0, 0); }
    100% { transform: translate(20px, -20px); }
}

/* 胶片噪点 */
body::after {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
    opacity: 0.15;
    pointer-events: none;
    z-index: 9999;
}

/* ===== 主内容 ===== */
.hero {
    padding: 100px 5vw;
}

/* ===== 滚动标题 ===== */
.name-marquee {
    overflow: hidden;
    white-space: nowrap;
    margin-bottom: 40px;
}

.track {
    display: inline-flex;
    gap: 60px;
    width: max-content;
    animation: scroll 12s linear infinite;
}

.track span {
    font-size: 90px;
    line-height: 1;
    transition: 0.3s;
    cursor: pointer;
}

.track span:hover {
    transform: scale(1.2);
}

/* 字体 */
.n2 { font-family: 'Pacifico'; color: #00ffd5; }
.n3 { font-family: 'Bebas Neue'; color: #ffd700; letter-spacing: 4px; }
.n4 { font-family: 'Orbitron'; color: #00f0ff; text-shadow: 0 0 15px #00f0ff; }
.n5 {
    background: linear-gradient(90deg, red, orange, yellow, green, cyan, blue, purple);
    -webkit-background-clip: text;
    color: transparent;
}

@keyframes scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-25%); }
}

/* 文案 */
.desc {
    margin-top: 20px;
    font-size: 18px;
    opacity: 0.8;
}

/* 按钮 */
.btn {
    margin-top: 25px;
    display: inline-block;
    padding: 12px 28px;
    background: white;
    color: black;
    border-radius: 25px;
    text-decoration: none;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px rgba(255,255,255,0.3);
}

/* ===== 分区 ===== */
.section {
    padding: 100px 5vw;
}

.title {
    font-size: 50px;
    margin-bottom: 30px;
}

/* 滚动渐入 */
.fade-in {
    opacity: 0;
    transform: translateY(30px);
    transition: all 0.8s ease-out;
}

.fade-in.visible {
    opacity: 1;
    transform: translateY(0);
}

/* 照片墙 */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 20px;
}

.gallery img {
    width: 100%;
    border-radius: 12px;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    filter: brightness(0.85);
}

.gallery img:hover {
    transform: scale(1.08) rotate(1deg);
    filter: brightness(1.15);
    box-shadow: 0 10px 30px rgba(0, 240, 255, 0.2);
}

/* 自定义音乐播放器 */
.custom-audio-player {
    display: flex;
    align-items: center;
    gap: 15px;
    background: rgba(255,255,255,0.05);
    padding: 12px 20px;
    border-radius: 30px;
    width: fit-content;
    border: 1px solid rgba(0, 240, 255, 0.3);
}

.play-btn {
    background: transparent;
    border: none;
    color: white;
    font-size: 18px;
    cursor: pointer;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.3s;
}

.play-btn:hover {
    background: rgba(0, 240, 255, 0.2);
    box-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
}

.progress-bar {
    width: 300px;
    height: 4px;
    background: rgba(255,255,255,0.2);
    border-radius: 2px;
    overflow: hidden;
    cursor: pointer;
}

.progress {
    height: 100%;
    background: #00f0ff;
    box-shadow: 0 0 10px #00f0ff;
    width: 0%;
    transition: width 0.1s linear;
}

.time {
    font-size: 14px;
    opacity: 0.8;
    min-width: 100px;
}

/* 回到顶部 */
.back-to-top {
    position: fixed;
    bottom: 30px;
    right: 30px;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: rgba(0, 240, 255, 0.2);
    border: 1px solid rgba(0, 240, 255, 0.5);
    color: white;
    font-size: 20px;
    cursor: pointer;
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s;
    z-index: 999;
}

.back-to-top.visible {
    opacity: 1;
    visibility: visible;
}

.back-to-top:hover {
    background: rgba(0, 240, 255, 0.4);
    box-shadow: 0 0 15px rgba(0, 240, 255, 0.5);
    transform: translateY(-5px);
}

/* 手机适配 - 完整补全 */
@media (max-width: 768px) {
    .track span {
        font-size: 50px;
    }
    .title {
        font-size: 32px;
    }
    .progress-bar {
        width: 180px;
    }
    .hero, .section {
        padding: 60px 5vw;
    }
    .gallery {
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    }
}
</style>
</head>
<body>

<!-- 主页面 -->
<div class="hero">
    <div class="name-marquee">
        <div class="track">
            <span class="n2">Drizzie</span>
            <span class="n3">潮流</span>
            <span class="n4">艺术</span>
            <span class="n5">生活</span>
            <span class="n2">Drizzie</span>
            <span class="n3">潮流</span>
            <span class="n4">艺术</span>
            <span class="n5">生活</span>
        </div>
    </div>

    <div class="desc fade-in">
        专注于潮流文化与视觉艺术，打造独一无二的个性风格<br>
        用创意诠释态度，用设计定义生活
    </div>

    <a href="#gallery" class="btn fade-in">探索作品</a>

    <!-- 音乐播放器 -->
    <div class="custom-audio-player fade-in" style="margin-top: 30px;">
        <button class="play-btn" id="playBtn">▶</button>
        <div class="progress-bar" id="progressBar">
            <div class="progress" id="progress"></div>
        </div>
        <div class="time" id="time">00:00 / 00:00</div>
    </div>
</div>

<!-- 照片墙区域 -->
<div id="gallery" class="section">
    <h2 class="title fade-in">作品展示</h2>
    <div class="gallery fade-in">
        <img src="https://picsum.photos/400/600?random=1" alt="作品">
        <img src="https://picsum.photos/400/600?random=2" alt="作品">
        <img src="https://picsum.photos/400/600?random=3" alt="作品">
        <img src="https://picsum.photos/400/600?random=4" alt="作品">
        <img src="https://picsum.photos/400/600?random=5" alt="作品">
        <img src="https://picsum.photos/400/600?random=6" alt="作品">
    </div>
</div>

<!-- 回到顶部按钮 -->
<button class="back-to-top" id="backToTop">↑</button>

<!-- 音频元素（隐藏） -->
<audio id="audio" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

<script>
// 1. 滚动淡入效果
const fadeElements = document.querySelectorAll('.fade-in');
const backToTopBtn = document.getElementById('backToTop');

function checkFade() {
    fadeElements.forEach(el => {
        const rect = el.getBoundingClientRect();
        const isVisible = rect.top < window.innerHeight * 0.85;
        if (isVisible) el.classList.add('visible');
    });

    // 回到顶部按钮显示/隐藏
    if (window.scrollY > 300) {
        backToTopBtn.classList.add('visible');
    } else {
        backToTopBtn.classList.remove('visible');
    }
}

window.addEventListener('scroll', checkFade);
window.addEventListener('load', checkFade);

// 2. 回到顶部功能
backToTopBtn.addEventListener('click', () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
});

// 3. 自定义音乐播放器
const audio = document.getElementById('audio');
const playBtn = document.getElementById('playBtn');
const progressBar = document.getElementById('progressBar');
const progress = document.getElementById('progress');
const timeDisplay = document.getElementById('time');

// 播放/暂停
playBtn.addEventListener('click', () => {
    if (audio.paused) {
        audio.play();
        playBtn.textContent = '⏸';
    } else {
        audio.pause();
        playBtn.textContent = '▶';
    }
});

// 更新进度条和时间
audio.addEventListener('timeupdate', () => {
    const percent = (audio.currentTime / audio.duration) * 100;
    progress.style.width = percent + '%';

    // 格式化时间
    const current = formatTime(audio.currentTime);
    const total = formatTime(audio.duration);
    timeDisplay.textContent = `${current} / ${total}`;
});

// 点击进度条跳转
progressBar.addEventListener('click', (e) => {
    const width = progressBar.clientWidth;
    const clickX = e.offsetX;
    audio.currentTime = (clickX / width) * audio.duration;
});

// 时间格式化
function formatTime(seconds) {
    if (isNaN(seconds)) return '00:00';
    const min = Math.floor(seconds / 60).toString().padStart(2, '0');
    const sec = Math.floor(seconds % 60).toString().padStart(2, '0');
    return `${min}:${sec}`;
}
</script>

</body>
</html>
