<!DOCTYPE html>

<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drizzie</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Monoton&family=Orbitron&family=Bebas+Neue&family=Pacifico&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}

body{
    background: radial-gradient(circle, #1f3b44, #000);
    color:white;
    font-family:sans-serif;
    overflow-x:hidden;
}

/* 粒子 */
canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:0;
}

/* 页面 */
.section{
    min-height:100vh;
    padding:120px 8vw;
    position:relative;
    z-index:2;
}

/* 标题 */
.title{
    font-size:80px;
    font-family:'Monoton';
}

/* 副标题 */
.sub{
    margin-top:10px;
    opacity:0.8;
}

/* 按钮 */
.btn{
    display:inline-block;
    margin-top:20px;
    padding:12px 30px;
    background:white;
    color:black;
    border-radius:30px;
    text-decoration:none;
}

/* 滚动动画 */
.fade{
    opacity:0;
    transform:translateY(50px);
    transition:0.8s;
}
.fade.show{
    opacity:1;
    transform:translateY(0);
}

/* 照片墙 */
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-top:40px;
}

.gallery img{
    width:100%;
    border-radius:12px;
}
</style>

</head>

<body>

<canvas id="bg"></canvas>

<!-- 首页 -->

<div class="section">
<h1 class="title fade">Drizzie</h1>
<p class="sub fade">记录生活 / 情绪 / 音乐</p>

<!-- 修复后的按钮 -->

<a href="#life" class="btn fade">进入我的世界</a>

</div>

<!-- 生活 -->

<div class="section" id="life">
<h2 class="title fade">生活</h2>

<div class="gallery fade">
<img src="https://picsum.photos/300/200?1">
<img src="https://picsum.photos/300/200?2">
<img src="https://picsum.photos/300/200?3">
<img src="https://picsum.photos/300/200?4">
</div>
</div>

<!-- 音乐 -->

<div class="section">
<h2 class="title fade">音乐</h2>

<audio controls loop class="fade">
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>
</div>

<script>
// ===== 滚动动画 =====
const fades=document.querySelectorAll(".fade");
window.addEventListener("scroll",()=>{
    let h=window.innerHeight*0.85;
    fades.forEach(el=>{
        if(el.getBoundingClientRect().top<h){
            el.classList.add("show");
        }
    });
});

// ===== 粒子背景 =====
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
resize();
window.onresize=resize;

let p=[];
for(let i=0;i<60;i++){
p.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:Math.random()-0.5,vy:Math.random()-0.5});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
p.forEach(o=>{
o.x+=o.vx;
o.y+=o.vy;
if(o.x<0||o.x>canvas.width)o.vx*=-1;
if(o.y<0||o.y>canvas.height)o.vy*=-1;
ctx.beginPath();
ctx.arc(o.x,o.y,2,0,Math.PI*2);
ctx.fillStyle="rgba(255,255,255,0.6)";
ctx.fill();
});
requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
