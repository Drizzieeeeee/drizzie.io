<!DOCTYPE html>

<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drizzie</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Monoton&family=Orbitron&family=Bebas+Neue&family=Pacifico&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

body {
    background: radial-gradient(circle, #1f3b44, #000);
    color: white;
    font-family: sans-serif;
    cursor: none;
    overflow-x: hidden;
}

/* ===== 粒子背景 ===== */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 0;
}

/* ===== Drizzie背景流 ===== */
.bg-text {
    position: fixed;
    width: 200%;
    height: 200%;
    z-index: 1;
    pointer-events: none;
}

.bg-text span {
    position: absolute;
    opacity: 0.08;
    animation: float linear infinite;
    white-space: nowrap;
}

@keyframes float {
    from { transform: translate(0,0); }
    to { transform: translate(-200px,-200px); }
}

/* ===== 主体 ===== */
.hero {
    position: relative;
    z-index: 2;
    padding: 120px 5vw;
    min-height: 200vh;
}

/* ===== 标题 ===== */
.name-marquee {
    overflow: hidden;
    white-space: nowrap;
}

.track {
    display: inline-flex;
    gap: 60px;
    animation: scroll 14s linear infinite;
}

.track span {
    font-size: 90px;
    transition: 0.3s;
}

.track span:hover {
    transform: scale(1.3) rotate(-6deg);
}

.n1 { font-family: 'Monoton'; color:#ff3b3b;}
.n2 { font-family: 'Pacifico'; color:#00ffd5;}
.n3 { font-family: 'Bebas Neue'; color:#ffd700;}
.n4 { font-family: 'Orbitron'; color:#00f0ff; text-shadow:0 0 20px #00f0ff;}
.n5 { background:linear-gradient(90deg,red,orange,yellow,green,cyan,blue,purple); -webkit-background-clip:text; color:transparent;}

@keyframes scroll {
    0% {transform:translateX(0);}
    100% {transform:translateX(-50%);}
}

/* ===== 滚动动画 ===== */
.fade {
    opacity: 0;
    transform: translateY(50px);
    transition: 0.8s ease;
}

.fade.show {
    opacity: 1;
    transform: translateY(0);
}

/* ===== 按钮 ===== */
.btn {
    margin-top: 20px;
    display:inline-block;
    padding:12px 28px;
    background:white;
    color:black;
    border-radius:25px;
    cursor:pointer;
}

/* ===== 鼠标 ===== */
.cursor {
    width:40px;
    height:40px;
    border-radius:50%;
    position:fixed;
    pointer-events:none;
    transform:translate(-50%,-50%);
    background:rgba(0,255,213,0.1);
    border:1px solid rgba(0,255,213,0.6);
    backdrop-filter: blur(5px);
    z-index:999;
}

/* ===== 照片墙 ===== */
.gallery {
    margin-top:100px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
}

.gallery img {
    width:100%;
    border-radius:12px;
}

/* ===== 音乐 ===== */
.music {
    position:fixed;
    bottom:20px;
    right:20px;
    z-index:10;
}

/* 手机适配 */
@media(max-width:768px){
    .track span { font-size:50px; }
}
</style>

</head>

<body>

<canvas id="bg"></canvas>

<div class="bg-text"></div>

<div class="hero">

<div class="name-marquee fade">
<div class="track">
<span class="n1">DRIZZIE</span>
<span class="n2">Drizzie</span>
<span class="n3">DRIZZIE</span>
<span class="n4">Drizzie</span>
<span class="n5">Drizzie</span>
<span class="n1">DRIZZIE</span>
</div>
</div>

<p class="fade">记录生活 / 情绪 / 音乐</p>
<div class="btn fade">进入我的世界</div>

<div class="gallery fade">
<img src="https://picsum.photos/300/200?1">
<img src="https://picsum.photos/300/200?2">
<img src="https://picsum.photos/300/200?3">
<img src="https://picsum.photos/300/200?4">
</div>

</div>

<div class="cursor"></div>

<div class="music">
<audio controls loop autoplay>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>
</div>

<script>
// ===== 鼠标 =====
const cursor = document.querySelector(".cursor");
document.addEventListener("mousemove", e=>{
    cursor.style.left=e.clientX+"px";
    cursor.style.top=e.clientY+"px";
});

// hover交互
document.querySelectorAll("span,.btn,img").forEach(el=>{
    el.addEventListener("mouseenter",()=>cursor.style.transform="translate(-50%,-50%) scale(1.8)");
    el.addEventListener("mouseleave",()=>cursor.style.transform="translate(-50%,-50%) scale(1)");
});

// ===== 滚动动画 =====
const fades = document.querySelectorAll(".fade");

window.addEventListener("scroll", ()=>{
    const trigger = window.innerHeight * 0.85;
    fades.forEach(el=>{
        const top = el.getBoundingClientRect().top;
        if(top < trigger){
            el.classList.add("show");
        }
    });
});

// ===== 背景文字 =====
const bg = document.querySelector(".bg-text");
const fonts=["Monoton","Orbitron","Bebas Neue","Pacifico"];
const colors=["#ff3b3b","#00ffd5","#ffd700","#8a2be2","#00f0ff"];

for(let i=0;i<50;i++){
    let s=document.createElement("span");
    s.innerText="Drizzie";
    s.style.left=Math.random()*100+"%";
    s.style.top=Math.random()*100+"%";
    s.style.fontSize=(40+Math.random()*120)+"px";
    s.style.color=colors[Math.floor(Math.random()*colors.length)];
    s.style.fontFamily=fonts[Math.floor(Math.random()*fonts.length)];
    s.style.animationDuration=(20+Math.random()*20)+"s";
    bg.appendChild(s);
}

// ===== 粒子 =====
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

function resize(){
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
}
resize();
window.onresize=resize;

let particles=[];
for(let i=0;i<60;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        vx:Math.random()*1-0.5,
        vy:Math.random()*1-0.5
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
        p.x+=p.vx;
        p.y+=p.vy;
        if(p.x<0||p.x>canvas.width)p.vx*=-1;
        if(p.y<0||p.y>canvas.height)p.vy*=-1;

        ctx.beginPath();
        ctx.arc(p.x,p.y,2,0,Math.PI*2);
        ctx.fillStyle="rgba(255,255,255,0.6)";
        ctx.fill();
    });
    requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
